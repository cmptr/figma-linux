name: Telegram / Stale Issues / Claude Triage

on:
  issues:
    types: [opened, labeled, closed]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  # Requires repository secrets:
  # - TELEGRAM_TOKEN: notification bot token from BotFather.
  # - TELEGRAM_CHAT_ID: target Telegram user/group/chat id, not the bot id.
  telegram-notifications:
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    uses: IliyaBrook/GitHub_workflows/.github/workflows/telegram-notify.yml@master
    secrets: inherit

  # No secrets required. Runs only on schedule/workflow_dispatch.
  stale-issues:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      issues: write
      pull-requests: write
    uses: IliyaBrook/GitHub_workflows/.github/workflows/stale-issues.yml@master
    secrets: inherit

  # Requires a repo self-hosted runner with labels self-hosted/openclaw,
  # /opt/openclaw/bin/openclaw-github-responder on the runner host,
  # and /opt/openclaw/secrets/github-hook-token readable by the runner user.
  # No GitHub secrets are required for this job.
  openclaw-issue-responder:
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    permissions:
      contents: read
      issues: read
    uses: IliyaBrook/GitHub_workflows/.github/workflows/openclaw-issue-responder.yml@master
    with:
      runner-labels: '["self-hosted","openclaw"]'
      responder-script: /opt/openclaw/bin/openclaw-github-responder
      bot-login: brooks-assistant
      assistant-name: Brooks Assistant
      hook-url: http://127.0.0.1:18789/hooks/agent
      hook-token-file: /opt/openclaw/secrets/github-hook-token

  # Same OpenClaw requirements as openclaw-issue-responder.
  # GitHub Discussions must be enabled in the repository for these events to fire.
  openclaw-discussion-responder:
    if: github.event_name == 'discussion' || github.event_name == 'discussion_comment'
    permissions:
      contents: read
      discussions: read
    uses: IliyaBrook/GitHub_workflows/.github/workflows/openclaw-discussion-responder.yml@master
    with:
      runner-labels: '["self-hosted","openclaw"]'
      responder-script: /opt/openclaw/bin/openclaw-github-responder
      bot-login: brooks-assistant
      assistant-name: Brooks Assistant
      hook-url: http://127.0.0.1:18789/hooks/agent
      hook-token-file: /opt/openclaw/secrets/github-hook-token
