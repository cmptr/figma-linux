name: Close Stale Issues

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for 30 days. It will be closed in 7 days if no further
            activity occurs. If this issue is still relevant, please leave a comment
            to keep it open.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Feel free to reopen it if the issue persists.
          stale-issue-label: stale
          exempt-issue-labels: bug,enhancement,pinned
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            any activity for 30 days. It will be closed in 14 days if no further
            activity occurs.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
          days-before-pr-close: 14
          stale-pr-label: stale